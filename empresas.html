<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Registro de Empresas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0f172a; color: #f8fafc; font-family: sans-serif; }
    .status-activa { color: #4ade80; font-weight: bold; }
    .status-inactiva { color: #f87171; font-weight: bold; }
    .status-suspendida { color: #fbbf24; font-weight: bold; }
    input, select { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; }
  </style>
</head>
<body class="p-4 md:p-10">

  <div id="lockScreen" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center">
    <div class="bg-slate-900 p-8 rounded-xl border border-slate-800 shadow-2xl w-full max-w-sm text-center">
      <div class="text-4xl mb-4">🔑</div>
      <h2 class="text-xl font-bold mb-4 text-white">Acceso Administrativo</h2>
      <input type="password" id="adminPass" class="w-full p-3 rounded mb-4 text-center text-white" placeholder="Introduce Clave Maestra">
      <button onclick="window.verificarAcceso();" class="w-full bg-indigo-600 p-3 rounded font-bold hover:bg-indigo-500 transition">Desbloquear</button>
      <p id="errorMsg" class="text-red-500 mt-2 hidden text-sm">Contraseña incorrecta</p>
    </div>
  </div>

  <div id="adminPanel" class="hidden">
    <div class="max-w-6xl mx-auto">
      <div class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-slate-800 pb-5 gap-4">
        <div>
          <h1 class="text-3xl font-bold text-white">Consola de Empresas</h1>
          <p class="text-slate-400">Control de licencias y acceso</p>
        </div>
        <button onclick="window.abrirModal();" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-lg font-bold shadow-lg transition">
          + Nueva Empresa
        </button>
      </div>

      <div class="bg-slate-900 rounded-xl overflow-hidden border border-slate-800 shadow-xl">
        <table class="w-full text-left">
          <thead class="bg-slate-800/50 text-slate-400 uppercase text-xs tracking-wider">
            <tr>
              <th class="p-4">Nombre de Empresa</th>
              <th class="p-4">Clave de Acceso</th>
              <th class="p-4 text-center">Gramaje Base</th>
              <th class="p-4 text-center">Estatus</th>
              <th class="p-4">Vencimiento</th>
              <th class="p-4 text-right">Gestión</th>
            </tr>
          </thead>
          <tbody id="listaEmpresas" class="divide-y divide-slate-800">
            </tbody>
        </table>
        <div id="loading" class="p-10 text-center text-slate-500">Cargando datos de Supabase...</div>
      </div>
    </div>
  </div>

  <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-[110]">
    <div class="bg-slate-900 p-6 rounded-xl border border-slate-700 w-full max-w-md shadow-2xl">
      <h2 id="modalTitle" class="text-2xl font-bold mb-6 text-white">Configurar Empresa</h2>
      <form id="formEmpresa">
        <input type="hidden" id="empId">
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Nombre Comercial</label>
            <input type="text" id="nombre" required class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Clave de Acceso (Token)</label>
            <input type="text" id="clave" required class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 font-mono">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Gramaje Base</label>
            <input type="number" id="gramaje" step="0.01" value="1000.00" class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Estado de Licencia</label>
            <select id="estatus" class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="activa">Activa</option>
              <option value="inactiva">Inactiva</option>
              <option value="suspendida">Suspendida</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Fecha de Expiración</label>
            <input type="date" id="vencimiento" class="w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
        </div>
        <div class="flex justify-end gap-3 mt-8">
          <button type="button" onclick="window.cerrarModal();" class="px-5 py-2 text-slate-400 hover:text-white transition">Cancelar</button>
          <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-lg font-bold transition">Guardar Registro</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // 1. Inicialización Única (Evita el error de re-declaración)
    const supabaseClient = window.supabase.createClient(
      "https://djjylikkocemrlsjxscr.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqanlsaWtrb2NlbXJsc2p4c2NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMxNjUyNDEsImV4cCI6MjA3ODc0MTI0MX0.fnv1BKn_o-PYEAPljG0V3dt3b2Uifwn8EEzkP8Aab3M"
    );

    const CLAVE_MAESTRA = "ADMIN2025";

    // 2. Funciones Globales
    window.verificarAcceso = function() {
      const pass = document.getElementById('adminPass').value;
      if (pass === CLAVE_MAESTRA) {
        document.getElementById('lockScreen').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        window.cargarEmpresas();
      } else {
        const err = document.getElementById('errorMsg');
        err.classList.remove('hidden');
        setTimeout(() => { err.classList.add('hidden'); }, 2000);
      };
    };

    window.cargarEmpresas = async function() {
      document.getElementById('loading').classList.remove('hidden');
      const { data, error } = await supabaseClient
        .from('empresas')
        .select('*')
        .order('nombre', { ascending: true });

      if (error) {
        console.error('Error:', error);
        return;
      };

      document.getElementById('loading').classList.add('hidden');
      const lista = document.getElementById('listaEmpresas');
      lista.innerHTML = "";
      
      data.forEach(emp => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-800/40 transition";
        tr.innerHTML = `
          <td class="p-4 font-bold text-white">${emp.nombre}</td>
          <td class="p-4 font-mono text-indigo-400">${emp.clave_acceso}</td>
          <td class="p-4 text-center">${parseFloat(emp.gramaje_base_analisis).toFixed(2)} ${emp.unidad_base_analisis}</td>
          <td class="p-4 text-center"><span class="status-${emp.estatus} uppercase text-xs">${emp.estatus}</span></td>
          <td class="p-4 text-slate-500 text-sm">${emp.fecha_vencimiento || 'Sin límite'}</td>
          <td class="p-4 text-right">
            <button onclick="window.cargarEdicion('${emp.id}');" class="text-indigo-400 hover:text-indigo-200 mr-4 font-medium">Configurar</button>
            <button onclick="window.eliminarEmpresa('${emp.id}', '${emp.nombre}');" class="text-red-500 hover:text-red-300">Eliminar</button>
          </td>
        `;
        lista.appendChild(tr);
      });
    };

    window.eliminarEmpresa = async function(id, nombre) {
      if (confirm(`¿Eliminar permanentemente a ${nombre}?`)) {
        await supabaseClient.from('empresas').delete().eq('id', id);
        window.cargarEmpresas();
      };
    };

    window.abrirModal = function() {
      document.getElementById('formEmpresa').reset();
      document.getElementById('empId').value = "";
      document.getElementById('modalTitle').innerText = "Nueva Empresa";
      document.getElementById('modal').classList.remove('hidden');
    };

    window.cerrarModal = function() {
      document.getElementById('modal').classList.add('hidden');
    };

    window.cargarEdicion = async function(id) {
      const { data } = await supabaseClient.from('empresas').select('*').eq('id', id).single();
      if (data) {
        document.getElementById('empId').value = data.id;
        document.getElementById('nombre').value = data.nombre;
        document.getElementById('clave').value = data.clave_acceso;
        document.getElementById('gramaje').value = data.gramaje_base_analisis;
        document.getElementById('estatus').value = data.estatus;
        document.getElementById('vencimiento').value = data.fecha_vencimiento || '';
        document.getElementById('modalTitle').innerText = "Editar Empresa";
        document.getElementById('modal').classList.remove('hidden');
      };
    };

    // 3. Manejo del Formulario
    document.getElementById('formEmpresa').onsubmit = async function(e) {
      e.preventDefault();
      const id = document.getElementById('empId').value;
      const payload = {
        nombre: document.getElementById('nombre').value.trim(),
        clave_acceso: document.getElementById('clave').value.trim(),
        gramaje_base_analisis: parseFloat(document.getElementById('gramaje').value),
        estatus: document.getElementById('estatus').value,
        fecha_vencimiento: document.getElementById('vencimiento').value || null,
        unidad_base_analisis: 'g'
      };

      let result;
      if (id) {
        result = await supabaseClient.from('empresas').update(payload).eq('id', id);
      } else {
        result = await supabaseClient.from('empresas').insert([payload]);
      };

      if (result.error) {
        alert("Error: " + result.error.message);
      } else {
        window.cerrarModal();
        window.cargarEmpresas();
      };
    };
  </script>
</body>
</html>
