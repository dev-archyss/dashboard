<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS — CAPTA</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  #map { height: 560px; border-radius: 1rem; overflow: hidden; border: 1px solid #E5E7EB; }
  .dark #map { border-color: #475569; }
</style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 font-sans transition-colors duration-300">
<script>tailwind.config = { darkMode: 'class' }</script>

{% include 'navbar.html' %}

<div class="container mx-auto p-4 sm:p-6 lg:p-8">

  <!-- Título -->
  <div class="mb-6">
    <h1 class="text-3xl font-extrabold text-gray-800 dark:text-white">
      <i class="fas fa-map-marker-alt mr-2 text-indigo-500"></i>Seguimiento GPS
    </h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Mapa de visitas con geolocalización de promotores.</p>
  </div>

  <!-- ── KPIs ─────────────────────────────────────────────────────── -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">

    <div class="bg-indigo-50 dark:bg-indigo-900/30 p-4 rounded-xl text-center border border-indigo-100 dark:border-indigo-800">
      <p class="text-2xl font-extrabold text-indigo-600" id="totalVisits">—</p>
      <p class="text-xs text-indigo-500 dark:text-indigo-300 font-medium mt-1">Total visitas</p>
      <div class="w-full bg-indigo-200 dark:bg-indigo-900 rounded-full h-1.5 mt-2">
        <div class="bg-indigo-600 h-1.5 rounded-full" style="width:70%"></div>
      </div>
    </div>

    <div class="bg-green-50 dark:bg-green-900/30 p-4 rounded-xl text-center border border-green-100 dark:border-green-800">
      <p class="text-2xl font-extrabold text-green-600" id="confirmedVisits">—</p>
      <p class="text-xs text-green-500 dark:text-green-300 font-medium mt-1">Confirmadas</p>
      <div class="w-full bg-green-200 dark:bg-green-900 rounded-full h-1.5 mt-2">
        <div id="confFill" class="bg-green-500 h-1.5 rounded-full transition-all duration-500" style="width:0%"></div>
      </div>
    </div>

    <div class="bg-red-50 dark:bg-red-900/30 p-4 rounded-xl text-center border border-red-100 dark:border-red-800">
      <p class="text-2xl font-extrabold text-red-600" id="unconfirmedVisits">—</p>
      <p class="text-xs text-red-500 dark:text-red-300 font-medium mt-1">No confirmadas</p>
      <div class="w-full bg-red-200 dark:bg-red-900 rounded-full h-1.5 mt-2">
        <div id="unconfFill" class="bg-red-500 h-1.5 rounded-full transition-all duration-500" style="width:0%"></div>
      </div>
    </div>

    <div class="bg-amber-50 dark:bg-amber-900/30 p-4 rounded-xl text-center border border-amber-100 dark:border-amber-800">
      <p class="text-2xl font-extrabold text-amber-600" id="confirmationRate">—</p>
      <p class="text-xs text-amber-500 dark:text-amber-300 font-medium mt-1">Tasa confirmación</p>
      <div class="w-full bg-amber-200 dark:bg-amber-900 rounded-full h-1.5 mt-2">
        <div id="rateFill" class="bg-amber-500 h-1.5 rounded-full transition-all duration-500" style="width:0%"></div>
      </div>
    </div>

  </div>

  <!-- ── Filtros ──────────────────────────────────────────────────── -->
  <div class="bg-white dark:bg-slate-800 shadow-lg rounded-2xl p-6 mb-8 border border-gray-100 dark:border-slate-700">
    <h2 class="text-lg font-bold text-gray-700 dark:text-white mb-4">Filtros</h2>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-4">
      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Desde</label>
        <input type="date" id="dateFrom"
          class="w-full h-10 border border-gray-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg px-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Hasta</label>
        <input type="date" id="dateTo"
          class="w-full h-10 border border-gray-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg px-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Promotor</label>
        <select id="promoter"
          class="w-full h-10 border border-gray-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg px-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="all">Todos</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Estado</label>
        <select id="state"
          class="w-full h-10 border border-gray-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg px-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="all">Todos</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Confirmación</label>
        <select id="confirmation"
          class="w-full h-10 border border-gray-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg px-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="all">Todos</option>
          <option value="verificado">Confirmados</option>
          <option value="no_verificado">No Confirmados</option>
          <option value="desconocido">Cliente Desconocido</option>
          <option value="sin_coordenadas">Sin Coordenadas</option>
        </select>
      </div>
    </div>
    <div class="border-t dark:border-slate-700 pt-4">
      <button onclick="filterRecords()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-5 rounded-lg shadow transition-all flex items-center gap-2">
        <i class="fas fa-filter"></i> Filtrar
      </button>
    </div>
  </div>

  <!-- ── Mapa ─────────────────────────────────────────────────────── -->
  <div class="bg-white dark:bg-slate-800 shadow-lg rounded-2xl p-5 border border-gray-100 dark:border-slate-700">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold text-gray-700 dark:text-white">Mapa interactivo</h2>
      <div class="flex items-center gap-4 text-xs text-gray-500 dark:text-gray-400">
        <span class="flex items-center gap-1.5">
          <span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span> Confirmada
        </span>
        <span class="flex items-center gap-1.5">
          <span class="w-3 h-3 rounded-full bg-red-500 inline-block"></span> No confirmada
        </span>
        <span class="flex items-center gap-1.5">
          <span class="w-3 h-3 rounded-full bg-amber-400 inline-block"></span> Sin coord. cliente
        </span>
      </div>
    </div>
    <div id="map"></div>
  </div>

</div>

<script>
tailwind.config = { darkMode: 'class' };

const empresaId = localStorage.getItem('empresa_id') || await (async()=>{try{const r=await fetch('/api/dashboard/config');if(r.ok){const d=await r.json();localStorage.setItem('empresa_id',d.empresa_id);localStorage.setItem('empresa_nombre',d.empresa_nombre);return d.empresa_id;}return null;}catch{return null;}})();
if (!empresaId) { window.location.replace('/'); throw new Error('no session'); }

let allRecords = [], filteredRecords = [], promoters = [], estados = [], map = null;

function getTodayMinus4Hours() {
  return new Date(Date.now() - 4 * 3600000).toISOString().split('T')[0];
}

// ── Fetch API ──────────────────────────────────────────────────────
async function fetchRecordsFromAPI(filters) {
  const p = new URLSearchParams();
  if (filters.dateFrom) p.append('date_from', filters.dateFrom);
  if (filters.dateTo)   p.append('date_to',   filters.dateTo);
  if (filters.promoterId && filters.promoterId !== 'all') p.append('promoter_id', filters.promoterId);
  p.append('empresa_id', empresaId);
  const lineaId = localStorage.getItem('sp-linea') || '';
  if (lineaId) p.append('linea_id', lineaId);
  try {
    const r = await fetch(`/api/records?${p.toString()}`);
    const d = await r.json();
    promoters = d.promoters || [];
    estados   = d.estados   || [];
    return d.records || [];
  } catch(e) { console.error(e); return []; }
}

function isConfirmed(r) {
  return r.latitude && r.longitude &&
         r.client_coords && r.client_coords !== 'N/A' &&
         r.distance < 150;
}

// ── Stats ──────────────────────────────────────────────────────────
function updateStats() {
  const total = filteredRecords.length;
  const conf  = filteredRecords.filter(isConfirmed).length;
  const rate  = total ? (conf / total * 100) : 0;

  document.getElementById('totalVisits').textContent        = total;
  document.getElementById('confirmedVisits').textContent    = conf;
  document.getElementById('unconfirmedVisits').textContent  = total - conf;
  document.getElementById('confirmationRate').textContent   = rate.toFixed(1) + '%';
  document.getElementById('confFill').style.width  = Math.min(100, rate) + '%';
  document.getElementById('unconfFill').style.width = Math.min(100, 100 - rate) + '%';
  document.getElementById('rateFill').style.width  = Math.min(100, rate) + '%';
}

// ── Mapa ───────────────────────────────────────────────────────────
function updateMap() {
  if (!map) {
    map = L.map('map').setView([10.5, -66.9], 6);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);
  } else {
    map.eachLayer(l => { if (l instanceof L.Marker) map.removeLayer(l); });
  }

  const bounds = L.latLngBounds([]);

  filteredRecords.forEach(r => {
    if (!r.latitude || !r.longitude) return;
    const lat = parseFloat(r.latitude), lng = parseFloat(r.longitude);
    if (isNaN(lat) || isNaN(lng)) return;

    const confirmed = isConfirmed(r);
    const noClientCoord = !r.client_coords || r.client_coords === 'N/A';
    const color = confirmed ? '#10b981' : noClientCoord ? '#f59e0b' : '#f43f5e';

    const icon = L.divIcon({
      className: '',
      html: `<div style="background:${color};width:13px;height:13px;border-radius:50%;border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,.35)"></div>`,
      iconSize: [13, 13], iconAnchor: [6, 6]
    });

    const date = new Date(r.created_at).toLocaleString('es-MX', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    L.marker([lat, lng], { icon }).addTo(map).bindPopup(`
      <div style="font-family:sans-serif;min-width:160px">
        <p style="font-weight:700;margin-bottom:4px">${r.promoter_name || '—'}</p>
        <p style="color:#6b7280;font-size:.8rem;margin-bottom:2px">${r.trade || '—'}</p>
        <p style="color:#6b7280;font-size:.75rem;margin-bottom:6px">${date}</p>
        <p style="font-weight:600;color:${color};font-size:.78rem">${confirmed ? '✓ Confirmada' : noClientCoord ? '⚠ Sin coord. cliente' : '✗ No confirmada'}</p>
        ${r.distance > 0 ? `<p style="font-size:.75rem;color:#9ca3af">Distancia: ${r.distance} m</p>` : ''}
      </div>`);

    bounds.extend([lat, lng]);
  });

  if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50] });
  else map.setView([10.5, -66.9], 6);
}

// ── Poblar selects ─────────────────────────────────────────────────
function populateSelects() {
  const pSel = document.getElementById('promoter');
  pSel.innerHTML = '<option value="all">Todos</option>';
  [...new Set(promoters.map(p => p.promoter_name))].sort().forEach(n => {
    const o = document.createElement('option'); o.value = n; o.textContent = n;
    pSel.appendChild(o);
  });

  const sSel = document.getElementById('state');
  sSel.innerHTML = '<option value="all">Todos</option>';
  [...new Map(estados.map(e => [e.id, e])).values()]
    .sort((a, b) => a.nombre.localeCompare(b.nombre))
    .forEach(e => {
      const o = document.createElement('option'); o.value = e.nombre; o.textContent = e.nombre;
      sSel.appendChild(o);
    });
}

// ── Filtrar ────────────────────────────────────────────────────────
async function filterRecords() {
  const df   = document.getElementById('dateFrom').value;
  const dt   = document.getElementById('dateTo').value;
  const prom = document.getElementById('promoter').value;
  const conf = document.getElementById('confirmation').value;
  const stateNm = document.getElementById('state').options[document.getElementById('state').selectedIndex].text;

  allRecords = await fetchRecordsFromAPI({ dateFrom: df, dateTo: dt, promoterId: prom });
  populateSelects();

  filteredRecords = allRecords.filter(r => {
    if (stateNm !== 'Todos' && r.state !== stateNm) return false;
    const hv = r.latitude && r.longitude;
    const hc = r.client_coords && r.client_coords !== 'N/A';
    const confirmed = hv && hc && r.distance < 150;
    if (conf === 'verificado'      && !confirmed)        return false;
    if (conf === 'no_verificado'   && (confirmed || !hc)) return false;
    if (conf === 'desconocido'     && hc)                 return false;
    if (conf === 'sin_coordenadas' && hv)                 return false;
    return true;
  });

  updateStats();
  updateMap();
}

// ── Init ───────────────────────────────────────────────────────────
async function init() {
  const today = getTodayMinus4Hours();
  document.getElementById('dateFrom').value = today;
  document.getElementById('dateTo').value   = today;
  await filterRecords();
  ['dateFrom','dateTo','promoter','state','confirmation'].forEach(id =>
    document.getElementById(id).addEventListener('change', filterRecords));
}

// Reaccionar al cambio de línea desde el navbar
window.onLineaChanged = () => filterRecords();

window.addEventListener('capta:db-ready', init);
</script>
</body>
</html>
