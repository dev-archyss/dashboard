<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS — CAPTA</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
#map{height:580px;border-radius:var(--r2);overflow:hidden;border:1px solid var(--brd)}
</style>
</head>
<body>
{% include 'navbar.html' %}

<main class="sp-page">
  <div class="sp-page-hdr">
    <div>
      <h1 class="sp-page-title">Seguimiento GPS</h1>
      <p class="sp-page-sub">Mapa de visitas con geolocalización de promotores.</p>
    </div>
  </div>

  <!-- KPIs -->
  <div class="sp-grid sp-g4 sp-gap4" style="margin-bottom:20px">
    <div class="sp-card sp-kpi indigo">
      <div class="sp-kpi-top"><div class="sp-kpi-icon"><i class="fas fa-map-marker-alt"></i></div>
        <div style="text-align:right"><div class="sp-kpi-val" id="totalVisits">—</div><div class="sp-kpi-lbl">Total visitas</div></div></div>
      <div class="sp-kpi-bar"><div class="sp-kpi-fill" style="width:70%;background:var(--accent)"></div></div>
    </div>
    <div class="sp-card sp-kpi green">
      <div class="sp-kpi-top"><div class="sp-kpi-icon"><i class="fas fa-check-circle"></i></div>
        <div style="text-align:right"><div class="sp-kpi-val" id="confirmedVisits">—</div><div class="sp-kpi-lbl">Confirmadas</div></div></div>
      <div class="sp-kpi-bar"><div class="sp-kpi-fill" id="confFill" style="width:0%;background:var(--green)"></div></div>
    </div>
    <div class="sp-card sp-kpi rose">
      <div class="sp-kpi-top"><div class="sp-kpi-icon"><i class="fas fa-times-circle"></i></div>
        <div style="text-align:right"><div class="sp-kpi-val" id="unconfirmedVisits">—</div><div class="sp-kpi-lbl">No confirmadas</div></div></div>
      <div class="sp-kpi-bar"><div class="sp-kpi-fill" style="width:0%;background:var(--red)"></div></div>
    </div>
    <div class="sp-card sp-kpi amber">
      <div class="sp-kpi-top"><div class="sp-kpi-icon"><i class="fas fa-percentage"></i></div>
        <div style="text-align:right"><div class="sp-kpi-val" id="confirmationRate">—</div><div class="sp-kpi-lbl">Tasa confirmación</div></div></div>
      <div class="sp-kpi-bar"><div class="sp-kpi-fill" id="rateFill" style="width:0%;background:var(--amber)"></div></div>
    </div>
  </div>

  <!-- Filtros -->
  <div class="sp-card" style="margin-bottom:20px">
    <p class="sp-sec-title">Filtros</p>
    <div class="sp-grid sp-g5 sp-gap4" style="margin-bottom:12px">
      <div><label class="sp-label">Desde</label><input type="date" id="dateFrom" class="sp-input"></div>
      <div><label class="sp-label">Hasta</label><input type="date" id="dateTo" class="sp-input"></div>
      <div><label class="sp-label">Promotor</label><select id="promoter" class="sp-select"><option value="all">Todos</option></select></div>
      <div><label class="sp-label">Estado</label><select id="state" class="sp-select"><option value="all">Todos</option></select></div>
      <div><label class="sp-label">Confirmación</label>
        <select id="confirmation" class="sp-select">
          <option value="all">Todos</option>
          <option value="verificado">Confirmados</option>
          <option value="no_verificado">No Confirmados</option>
          <option value="desconocido">Cliente Desconocido</option>
          <option value="sin_coordenadas">Sin Coordenadas</option>
        </select>
      </div>
    </div>
    <button onclick="filterRecords()" class="sp-btn sp-btn-primary"><i class="fas fa-filter"></i> Filtrar</button>
  </div>

  <!-- Mapa -->
  <div class="sp-card">
    <p class="sp-sec-title">Mapa interactivo</p>
    <div id="map"></div>
  </div>
</main>

<script>
const empresaId=localStorage.getItem('empresa_id');
if(!empresaId)window.location.href='/';
let allRecords=[],filteredRecords=[],promoters=[],estados=[],zonas=[],map=null;

function getTodayMinus4Hours(){const d=new Date(Date.now()-4*3600000);return d.toISOString().split('T')[0];}

async function fetchRecordsFromAPI(filters){
  const p=new URLSearchParams();
  if(filters.dateFrom)p.append('date_from',filters.dateFrom);
  if(filters.dateTo)p.append('date_to',filters.dateTo);
  if(filters.promoterId&&filters.promoterId!=='all')p.append('promoter_id',filters.promoterId);
  p.append('empresa_id',empresaId);
  try{
    const r=await fetch(`/api/records?${p.toString()}`);const d=await r.json();
    promoters=d.promoters||[];estados=d.estados||[];zonas=d.zonas||[];
    return d.records||[];
  }catch(e){console.error(e);return[];}
}

function isConfirmed(r){return r.verified==='Confirmado';}

function updateStats(){
  const total=filteredRecords.length;const conf=filteredRecords.filter(isConfirmed).length;
  const rate=total?(conf/total*100):0;
  document.getElementById('totalVisits').textContent=total;
  document.getElementById('confirmedVisits').textContent=conf;
  document.getElementById('unconfirmedVisits').textContent=total-conf;
  document.getElementById('confirmationRate').textContent=rate.toFixed(1)+'%';
  document.getElementById('confFill').style.width=Math.min(100,rate)+'%';
  document.getElementById('rateFill').style.width=Math.min(100,rate)+'%';
}

function updateMap(){
  if(!map){
    map=L.map('map').setView([10.5,-66.9],6);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(map);
  }else{
    map.eachLayer(l=>{if(l instanceof L.Marker||l instanceof L.CircleMarker)map.removeLayer(l);});
  }
  let bounds=L.latLngBounds([]);
  filteredRecords.forEach(r=>{
    if(r.latitude&&r.longitude){
      const lat=parseFloat(r.latitude),lng=parseFloat(r.longitude);
      if(!isNaN(lat)&&!isNaN(lng)){
        const color=isConfirmed(r)?'#10b981':'#f43f5e';
        const icon=L.divIcon({className:'',html:`<div style="background:${color};width:12px;height:12px;border-radius:50%;border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,.4)"></div>`,iconSize:[12,12],iconAnchor:[6,6]});
        L.marker([lat,lng],{icon}).addTo(map).bindPopup(`<b>${r.promoter_name||'—'}</b><br>${r.trade||'—'}<br><small>${new Date(r.created_at).toLocaleString('es-MX')}</small><br><span style="color:${color}">${r.verified||'—'}</span>`);
        bounds.extend([lat,lng]);
      }
    }
  });
  if(bounds.isValid())map.fitBounds(bounds,{padding:[50,50]});else map.setView([10.5,-66.9],6);
}

function populateSelects(){
  const pSel=document.getElementById('promoter');pSel.innerHTML='<option value="all">Todos</option>';
  [...new Set(promoters.map(p=>p.promoter_name))].sort().forEach(n=>pSel.innerHTML+=`<option value="${n}">${n}</option>`);
  const sSel=document.getElementById('state');sSel.innerHTML='<option value="all">Todos</option>';
  [...new Map(estados.map(e=>[e.id,e])).values()].sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(e=>sSel.innerHTML+=`<option value="${e.nombre}">${e.nombre}</option>`);
}

async function filterRecords(){
  const df=document.getElementById('dateFrom').value,dt=document.getElementById('dateTo').value;
  const prom=document.getElementById('promoter').value,conf=document.getElementById('confirmation').value;
  const stateNm=document.getElementById('state').options[document.getElementById('state').selectedIndex].text;
  allRecords=await fetchRecordsFromAPI({dateFrom:df,dateTo:dt,promoterId:prom});
  populateSelects();
  filteredRecords=allRecords.filter(r=>{
    if(stateNm!=='Todos'&&r.state!==stateNm)return false;
    if(conf==='verificado'&&!isConfirmed(r))return false;
    if(conf==='no_verificado'&&(isConfirmed(r)||r.client_coords==='N/A'))return false;
    if(conf==='desconocido'&&r.client_coords!=='N/A')return false;
    if(conf==='sin_coordenadas'&&r.latitude)return false;
    return true;
  });
  updateStats();updateMap();
}

async function init(){
  const today=getTodayMinus4Hours();
  document.getElementById('dateFrom').value=today;document.getElementById('dateTo').value=today;
  await filterRecords();
  document.querySelectorAll('#dateFrom,#dateTo,#promoter,#state,#confirmation').forEach(el=>el.addEventListener('change',filterRecords));
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
