<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caras en Anaquel — CAPTA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
{% include 'navbar.html' %}

<main class="sp-page">
  <div class="sp-page-hdr">
    <div>
      <h1 class="sp-page-title">Caras en Anaquel</h1>
      <p class="sp-page-sub">Análisis de share of shelf (SOS) por promotor y producto.</p>
    </div>
  </div>

  <!-- Filtros -->
  <div class="sp-card" style="margin-bottom:20px">
    <p class="sp-sec-title">Filtros</p>
    <div class="sp-grid sp-g5 sp-gap4" style="margin-bottom:12px">
      <div><label class="sp-label">Desde</label><input type="date" id="dateFrom" class="sp-input"></div>
      <div><label class="sp-label">Hasta</label><input type="date" id="dateTo" class="sp-input"></div>
      <div><label class="sp-label">Promotor</label><select id="promoter" class="sp-select"><option value="all">Todos</option></select></div>
      <div><label class="sp-label">Estado</label><select id="state" class="sp-select"><option value="all">Todos</option></select></div>
      <div><label class="sp-label">Zona</label><select id="zone" class="sp-select" disabled><option value="all">Todas</option></select></div>
    </div>
    <button onclick="loadData()" class="sp-btn sp-btn-primary"><i class="fas fa-filter"></i> Aplicar</button>
  </div>

  <!-- KPIs -->
  <div class="sp-grid sp-g4 sp-gap4" style="margin-bottom:20px">
    <div class="sp-card sp-kpi indigo">
      <div class="sp-kpi-top"><div class="sp-kpi-icon"><i class="fas fa-percentage"></i></div>
        <div style="text-align:right"><div class="sp-kpi-val" id="sosDisplay">—</div><div class="sp-kpi-lbl">SOS Total</div></div></div>
      <div class="sp-kpi-bar"><div class="sp-kpi-fill" id="sosFill" style="width:0%;background:var(--accent)"></div></div>
    </div>
    <div class="sp-card sp-kpi green">
      <div class="sp-kpi-top"><div class="sp-kpi-icon"><i class="fas fa-eye"></i></div>
        <div style="text-align:right"><div class="sp-kpi-val" id="totalAfterDisplay">—</div><div class="sp-kpi-lbl">Caras después</div></div></div>
      <div class="sp-kpi-bar"><div class="sp-kpi-fill" style="width:75%;background:var(--green)"></div></div>
    </div>
    <div class="sp-card sp-kpi amber">
      <div class="sp-kpi-top"><div class="sp-kpi-icon"><i class="fas fa-history"></i></div>
        <div style="text-align:right"><div class="sp-kpi-val" id="netChangeDisplay">—</div><div class="sp-kpi-lbl">Cambio neto</div></div></div>
      <div class="sp-kpi-bar"><div class="sp-kpi-fill" style="width:50%;background:var(--amber)"></div></div>
    </div>
    <div class="sp-card sp-kpi purple">
      <div class="sp-kpi-top"><div class="sp-kpi-icon"><i class="fas fa-chart-pie"></i></div>
        <div style="text-align:right"><div class="sp-kpi-val" id="compFacesDisplay">—</div><div class="sp-kpi-lbl">Caras competencia</div></div></div>
      <div class="sp-kpi-bar"><div class="sp-kpi-fill" style="width:40%;background:var(--purple)"></div></div>
    </div>
  </div>

  <!-- Charts + tabla -->
  <div class="sp-grid sp-gap5" style="grid-template-columns:1fr 340px;margin-bottom:20px">
    <div class="sp-card">
      <p class="sp-sec-title">Detalle por Producto</p>
      <div style="overflow-x:auto">
        <table class="sp-tbl">
          <thead><tr>
            <th>Producto</th>
            <th style="text-align:center">Caras Antes</th>
            <th style="text-align:center">Caras Después</th>
            <th style="text-align:center">Diferencia</th>
          </tr></thead>
          <tbody id="facesTableBody">
            <tr><td colspan="4" style="text-align:center;padding:36px;color:var(--muted)"><i class="fas fa-spinner fa-spin" style="color:var(--accent);font-size:1.2rem;display:block;margin-bottom:8px"></i>Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="sp-card" style="display:flex;flex-direction:column">
      <p class="sp-sec-title">SOS — Share of Shelf</p>
      <div style="flex:1;position:relative;min-height:220px"><canvas id="sosChart"></canvas></div>
    </div>
  </div>
</main>

<script>
const supabaseClient=supabase.createClient('https://djjylikkocemrlsjxscr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqanlsaWtrb2NlbXJsc2p4c2NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMxNjUyNDEsImV4cCI6MjA3ODc0MTI0MX0.fnv1BKn_o-PYEAPljG0V3dt3b2Uifwn8EEzkP8Aab3M');
const empresaId=localStorage.getItem('empresa_id');
if(!empresaId)window.location.href='/';

let sosChartInst=null;let allZonas=[];

async function loadCatalogs(){
  const{data:promos}=await supabaseClient.from('web_promotores').select('promoter_name').eq('empresa_id',empresaId).order('promoter_name');
  const pSel=document.getElementById('promoter');
  (promos||[]).forEach(p=>{pSel.innerHTML+=`<option value="${p.promoter_name}">${p.promoter_name}</option>`;});
  const{data:estados}=await supabaseClient.from('web_estados').select('id,nombre').order('nombre');
  const{data:zonas}=await supabaseClient.from('web_zonas').select('id,nombre,estado_id').order('nombre');
  allZonas=zonas||[];
  const sSel=document.getElementById('state');
  (estados||[]).forEach(e=>sSel.innerHTML+=`<option value="${e.id}">${e.nombre}</option>`);
  sSel.addEventListener('change',()=>{
    const zSel=document.getElementById('zone');const sid=sSel.value;
    zSel.innerHTML='<option value="all">Todas</option>';zSel.disabled=sid==='all';
    if(sid!=='all')allZonas.filter(z=>String(z.estado_id)===sid).forEach(z=>zSel.innerHTML+=`<option value="${z.nombre}">${z.nombre}</option>`);
  });
}

async function loadData(){
  const df=document.getElementById('dateFrom').value,dt=document.getElementById('dateTo').value;
  const prom=document.getElementById('promoter').value,st=document.getElementById('state').value;
  const zone=document.getElementById('zone').value;
  let q=supabaseClient.from('web_precios').select('created_at,promoter_name,state,zone,trade,total_faces_before,our_faces_before_manual,our_faces_before_counted,total_faces,our_faces_after,myitems').eq('empresa_id',empresaId);
  if(df)q=q.gte('created_at',`${df}T00:00:00`);
  if(dt)q=q.lte('created_at',`${dt}T23:59:59`);
  if(prom!=='all')q=q.eq('promoter_name',prom);
  if(st!=='all'){const sOpt=document.getElementById('state').options[document.getElementById('state').selectedIndex];q=q.eq('state',sOpt.text);}
  if(zone!=='all')q=q.eq('zone',zone);
  const{data,error}=await q;
  if(error)return;
  processData(data||[]);
}

function processData(records){
  let totalBeforeCounted=0,totalAfter=0,totalShelf=0;const productStats={};
  records.forEach(r=>{
    totalBeforeCounted+=r.our_faces_before_counted||0;
    totalAfter+=r.our_faces_after||0;
    totalShelf+=r.total_faces||0;
    (r.myitems||[]).forEach(item=>{
      if(!item.presentation||item.presentation==='SIN STOCK')return;
      if(!productStats[item.presentation])productStats[item.presentation]={before:0,after:0};
      productStats[item.presentation].before+=item.faces_before||0;
      productStats[item.presentation].after+=item.faces_after||0;
    });
  });
  const sos=totalShelf>0?((totalAfter/totalShelf)*100).toFixed(1):'0.0';
  const netChange=totalAfter-totalBeforeCounted;
  const compFaces=Math.max(0,totalShelf-totalAfter);
  document.getElementById('sosDisplay').textContent=`${sos}%`;
  document.getElementById('sosFill').style.width=Math.min(100,parseFloat(sos))+'%';
  document.getElementById('totalAfterDisplay').textContent=totalAfter;
  document.getElementById('netChangeDisplay').textContent=(netChange>=0?'+':'')+netChange;
  document.getElementById('compFacesDisplay').textContent=compFaces;
  renderTable(productStats);
  renderSosChart(parseFloat(sos),compFaces>0?((compFaces/totalShelf)*100).toFixed(1):0);
}

function renderTable(stats){
  const tbody=document.getElementById('facesTableBody');
  const items=Object.entries(stats).sort((a,b)=>b[1].after-a[1].after);
  if(!items.length){tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:24px">Sin datos</td></tr>';return;}
  tbody.innerHTML=items.map(([name,s])=>{
    const diff=s.after-s.before;const dc=diff>0?'var(--green)':diff<0?'var(--red)':'var(--muted)';
    return`<tr><td class="sp-hi">${name}</td><td style="text-align:center">${s.before}</td><td style="text-align:center;font-weight:600;color:var(--accent)">${s.after}</td>
    <td style="text-align:center;font-weight:700;color:${dc}">${diff>0?'+':''}${diff}</td></tr>`;
  }).join('');
}

function renderSosChart(sosPct,compPct){
  const dark=document.documentElement.classList.contains('dark');
  const ctx=document.getElementById('sosChart').getContext('2d');
  const data={labels:['Nuestras','Competencia','Resto'],datasets:[{data:[sosPct,compPct,Math.max(0,100-sosPct-compPct)],backgroundColor:['#4f46e5','#f43f5e','#e2e8f0'],borderWidth:0}]};
  if(sosChartInst){sosChartInst.data=data;sosChartInst.update('none');return;}
  sosChartInst=new Chart(ctx,{type:'doughnut',data,options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:dark?'#94a3b8':'#4b5563',font:{size:11},padding:12}},tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed.toFixed(1)}%`}}},cutout:'65%'}});
}

function setDates(){const t=new Date(),s=new Date(t);s.setDate(t.getDate()-(t.getDay()===0?6:t.getDay()-1));document.getElementById('dateFrom').value=s.toISOString().split('T')[0];document.getElementById('dateTo').value=t.toISOString().split('T')[0];}

document.addEventListener('DOMContentLoaded',async()=>{setDates();await loadCatalogs();await loadData();});
</script>
</body>
</html>
