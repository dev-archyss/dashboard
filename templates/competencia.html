<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Competencia — CAPTA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
{% include 'navbar.html' %}

<main class="sp-page">
  <div class="sp-page-hdr">
    <div>
      <h1 class="sp-page-title">Productos de la competencia</h1>
      <p class="sp-page-sub">Registra las presentaciones de competidores para el análisis comparativo.</p>
    </div>
  </div>

  <!-- Formulario -->
  <div class="sp-card" style="margin-bottom:20px">
    <p class="sp-sec-title" id="formTitle">Nueva presentación de competidor</p>
    <form id="productForm">
      <input type="hidden" id="product_id">
      <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end">
        <div style="flex:1;min-width:240px">
          <label class="sp-label">Presentación *</label>
          <input type="text" id="presentation" class="sp-input" placeholder="Nombre de la presentación del competidor" required>
        </div>
        <div style="display:flex;gap:8px">
          <button type="submit" id="submitButton" class="sp-btn sp-btn-primary"><i class="fas fa-plus"></i> Crear</button>
          <button type="button" id="cancelButton" class="sp-btn sp-btn-sec" style="display:none" onclick="resetForm()"><i class="fas fa-times"></i> Cancelar</button>
        </div>
      </div>
    </form>
  </div>

  <!-- Buscar + tabla -->
  <div class="sp-card">
    <div style="margin-bottom:14px">
      <div class="sp-search">
        <i class="fas fa-search sp-search-ico"></i>
        <input type="text" id="searchInput" class="sp-input" placeholder="Buscar presentación…" oninput="filterProducts()">
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="sp-tbl" id="productsTable">
        <thead><tr>
          <th style="width:65%">Presentación</th>
          <th>Creado</th>
          <th style="text-align:center">Acciones</th>
        </tr></thead>
        <tbody id="productsTableBody"></tbody>
      </table>
      <p id="loadingMessage" style="text-align:center;color:var(--muted);padding:32px 0"><i class="fas fa-spinner fa-spin" style="color:var(--accent);margin-right:6px"></i>Cargando...</p>
      <p id="noResultsMessage" style="display:none;text-align:center;color:var(--muted);padding:24px 0">Sin resultados</p>
    </div>
  </div>
</main>

<script>
const supabaseUrl='https://djjylikkocemrlsjxscr.supabase.co';
const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqanlsaWtrb2NlbXJsc2p4c2NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMxNjUyNDEsImV4cCI6MjA3ODc0MTI0MX0.fnv1BKn_o-PYEAPljG0V3dt3b2Uifwn8EEzkP8Aab3M';
const db=supabase.createClient(supabaseUrl,supabaseKey);
const empresaId=localStorage.getItem('empresa_id');
const API_URL=`${supabaseUrl}/rest/v1/web_competidorproductos`;
const defaultHeaders={'apikey':supabaseKey,'Authorization':'Bearer '+supabaseKey,'Content-Type':'application/json','Prefer':'return=representation'};
if(!empresaId)window.location.href='/';

let allProducts=[];

function formatDate(s){if(!s)return'—';return new Date(s).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'2-digit'});}

async function loadProducts(){
  const tbody=document.getElementById('productsTableBody');
  document.getElementById('loadingMessage').style.display='block';
  tbody.innerHTML='';
  const r=await fetch(`${API_URL}?empresa_id=eq.${empresaId}&order=presentation`,{headers:defaultHeaders});
  allProducts=r.ok?await r.json():[];
  document.getElementById('loadingMessage').style.display='none';
  renderProducts(allProducts);
}

function renderProducts(products){
  const tbody=document.getElementById('productsTableBody');
  const noMsg=document.getElementById('noResultsMessage');
  tbody.innerHTML='';noMsg.style.display='none';
  if(!products.length){noMsg.style.display='block';return;}
  tbody.innerHTML=products.map(p=>`<tr>
    <td class="sp-hi">${p.presentation}</td>
    <td>${formatDate(p.created_at)}</td>
    <td style="text-align:center;white-space:nowrap">
      <button onclick="editProduct('${p.id}','${p.presentation.replace(/'/g,"\\'")}')" class="sp-btn sp-btn-sec sp-btn-sm"><i class="fas fa-pen"></i></button>
      <button onclick="deleteProduct('${p.id}')" class="sp-btn sp-btn-danger sp-btn-sm" style="margin-left:4px"><i class="fas fa-trash"></i></button>
    </td>
  </tr>`).join('');
}

function filterProducts(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  renderProducts(allProducts.filter(p=>p.presentation.toLowerCase().includes(q)));
}

document.getElementById('productForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const id=document.getElementById('product_id').value;
  const presentation=document.getElementById('presentation').value.trim();
  if(!presentation)return;
  let r;
  if(id){
    r=await fetch(`${API_URL}/${id}`,{method:'PATCH',headers:defaultHeaders,body:JSON.stringify({presentation,empresa_id:empresaId})});
  }else{
    r=await fetch(API_URL,{method:'POST',headers:defaultHeaders,body:JSON.stringify({presentation,empresa_id:empresaId})});
  }
  if(r.ok||r.status===201||r.status===204){captaToast(id?'Actualizado':'Creado','success');resetForm();loadProducts();}
  else captaToast('Error al guardar','error');
});

function editProduct(id,presentation){
  document.getElementById('product_id').value=id;
  document.getElementById('presentation').value=presentation;
  document.getElementById('formTitle').textContent='Editar presentación';
  document.getElementById('submitButton').innerHTML='<i class="fas fa-save"></i> Guardar';
  document.getElementById('cancelButton').style.display='';
}

async function deleteProduct(id){
  if(!confirm('¿Eliminar esta presentación de competidor?'))return;
  const r=await fetch(`${API_URL}/${id}?empresa_id=${empresaId}`,{method:'DELETE',headers:defaultHeaders});
  if(r.status===204||r.ok){captaToast('Eliminado','success');loadProducts();}
  else captaToast('Error al eliminar','error');
}

function resetForm(){
  document.getElementById('product_id').value='';document.getElementById('presentation').value='';
  document.getElementById('formTitle').textContent='Nueva presentación de competidor';
  document.getElementById('submitButton').innerHTML='<i class="fas fa-plus"></i> Crear';
  document.getElementById('cancelButton').style.display='none';
}

window.editProduct=editProduct;window.deleteProduct=deleteProduct;window.resetForm=resetForm;
document.addEventListener('DOMContentLoaded',()=>loadProducts());
</script>
</body>
</html>
