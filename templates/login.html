<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Captura de Precios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(to right, #4f46e5, #7c3aed);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(to right, #4338ca, #6d28d9);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .input-focus:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
            border-color: #6366f1;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md card">
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-8 text-white text-center">
            <h1 class="text-3xl font-extrabold">Sistema de Captura de Precios</h1>
            <p class="mt-2 opacity-90">Acceso exclusivo para empresas registradas</p>
        </div>

        <div class="p-8">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="empresaNombre" class="block text-sm font-semibold text-gray-700 mb-2">
                        Nombre de la Empresa
                    </label>
                    <input 
                        type="text" 
                        id="empresaNombre" 
                        placeholder="Ingresa el nombre exacto de tu empresa" 
                        required
                        autocomplete="organization"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl input-focus transition">
                </div>

                <div>
                    <label for="claveAcceso" class="block text-sm font-semibold text-gray-700 mb-2">
                        Clave de Acceso
                    </label>
                    <input 
                        type="password" 
                        id="claveAcceso" 
                        placeholder="Tu clave secreta" 
                        required
                        autocomplete="current-password"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl input-focus transition">
                </div>

                <button 
                    type="submit" 
                    id="btnSubmit"
                    class="w-full btn-primary text-white font-bold py-4 rounded-xl flex items-center justify-center text-lg">
                    <span id="btnText">Iniciar Sesión</span>
                    <span id="btnSpinner" class="spinner hidden"></span>
                </button>
            </form>

            <div id="errorMsg" class="mt-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg hidden">
                <p class="font-medium text-center"></p>
            </div>

            <div id="successMsg" class="mt-6 p-4 bg-green-50 border border-green-200 text-green-700 rounded-lg hidden">
                <p class="font-medium text-center">¡Bienvenido! Redirigiendo al dashboard...</p>
            </div>

            <div class="mt-8 text-center text-xs text-gray-500">
                <p>¿Problemas de acceso? Contacta a soporte técnico.</p>
            </div>
        </div>
    </div>

    <script>
    


        const form = document.getElementById('loginForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const errorMsg = document.getElementById('errorMsg').querySelector('p');
        const successMsg = document.getElementById('successMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nombre = document.getElementById('empresaNombre').value.trim();
            const clave = document.getElementById('claveAcceso').value.trim();

            errorMsg.parentElement.classList.add('hidden');
            successMsg.classList.add('hidden');
            errorMsg.textContent = '';

            if (!nombre || !clave) {
                mostrarError('Por favor, completa ambos campos.');
                return;
            }

            btnSubmit.disabled = true;
            btnText.textContent = 'Validando...';
            btnSpinner.classList.remove('hidden');

            try {
                const { data, error } = await supabaseClient

                    .from('empresas')
                    .select('id, nombre, clave_acceso, estatus, fecha_vencimiento, gramaje_base_analisis, unidad_base_analisis')
                    .eq('nombre', nombre)
                    .single();

                if (error || !data) {
                    mostrarError(error?.code === 'PGRST116' ? 'Empresa no encontrada. Verifica el nombre exacto.' : 'Error de conexión.');
                    resetearBoton();
                    return;
                }

                if (data.clave_acceso !== clave) {
                    mostrarError('Clave de acceso incorrecta.');
                    resetearBoton();
                    return;
                }

                if (data.estatus !== 'activa') {
                    mostrarError(`La empresa está ${data.estatus}. Contacta al administrador.`);
                    resetearBoton();
                    return;
                }

                if (data.fecha_vencimiento && new Date() > new Date(data.fecha_vencimiento)) {
                    mostrarError('La licencia de tu empresa ha expirado.');
                    resetearBoton();
                    return;
                }

                localStorage.setItem('empresa_id', data.id);
                localStorage.setItem('empresa_nombre', data.nombre);
                localStorage.setItem('gramaje_base_analisis', data.gramaje_base_analisis || 1000);
                localStorage.setItem('unidad_base_analisis', data.unidad_base_analisis || 'g');

                successMsg.classList.remove('hidden');
                btnText.textContent = 'Acceso concedido';

                setTimeout(() => window.location.href = '/dashboard', 1500);

            } catch (err) {
                console.error(err);
                mostrarError('Error inesperado. Revisa la consola.');
                resetearBoton();
            }
        });

        function mostrarError(mensaje) {
            errorMsg.textContent = mensaje;
            errorMsg.parentElement.classList.remove('hidden');
        }

        function resetearBoton() {
            btnSubmit.disabled = false;
            btnText.textContent = 'Iniciar Sesión';
            btnSpinner.classList.add('hidden');
        }

        document.getElementById('empresaNombre').addEventListener('input', () => errorMsg.parentElement.classList.add('hidden'));
        document.getElementById('claveAcceso').addEventListener('input', () => errorMsg.parentElement.classList.add('hidden'));
    </script>
</body>
</html>
