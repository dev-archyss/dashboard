<script>
    // Lógica del Tema (Oscuro/Claro)
    function initTheme() {
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    }
    initTheme();
    function toggleTheme() {
        if (document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.remove('dark'); localStorage.theme = 'light';
        } else {
            document.documentElement.classList.add('dark'); localStorage.theme = 'dark';
        }
    }
    // Resaltar enlace activo y cargar nombre empresa
    document.addEventListener('DOMContentLoaded', () => {
        const path = window.location.pathname;
        document.querySelectorAll('.nav-link').forEach(link => {
            if(link.getAttribute('href') === path) link.classList.add('bg-indigo-50', 'text-indigo-700', 'dark:bg-indigo-900/50', 'dark:text-indigo-300');
            else link.classList.add('text-gray-600', 'hover:bg-gray-50', 'hover:text-indigo-600', 'dark:text-gray-300', 'dark:hover:bg-slate-700');
        });
        const empresaNombre = localStorage.getItem('empresa_nombre') || 'Empresa';
        const navDisplay = document.getElementById('navEmpresaNombre');
        if (navDisplay) navDisplay.textContent = empresaNombre;
    });
</script>
