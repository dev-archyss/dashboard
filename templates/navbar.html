<!-- ═══════════════════════════════════════════════════════════
     SPARKING NAVBAR  —  Auto-ajuste inteligente, dark/light toggle
     ═══════════════════════════════════════════════════════════ -->

<script>
  /* Tema — se ejecuta antes del render para evitar flash */
  (function(){
    const saved = localStorage.getItem('sp-theme');
    const sys   = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (saved === 'dark' || (!saved && sys)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  })();
</script>

<!-- ═══════════════════════════════════════════════════════════
     NAVBAR SCRIPT
     ═══════════════════════════════════════════════════════════ -->
<script>
(function () {
  // ── Tema ────────────────────────────────────────────────────
  function isDark() { return document.documentElement.classList.contains('dark'); }

  function syncThemeIcons() {
    const dark = isDark();
    // Navbar
    document.getElementById('themeIconDark').style.display  = dark ? 'inline' : 'none';
    document.getElementById('themeIconLight').style.display = dark ? 'none'   : 'inline';
    // Drawer
    document.getElementById('drawerThemeIconDark').style.display  = dark ? 'inline' : 'none';
    document.getElementById('drawerThemeIconLight').style.display = dark ? 'none'   : 'inline';
    document.getElementById('drawerThemeLabel').textContent = dark ? 'Oscuro' : 'Claro';
  }

  window.toggleTheme = function () {
    const dark = isDark();
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('sp-theme', dark ? 'light' : 'dark');
    syncThemeIcons();
  };

  // ── Empresa nombre ───────────────────────────────────────────
  function loadEmpresaNombre() {
    const nombre = localStorage.getItem('empresa_nombre') || '';
    const els = ['navEmpresaNombre', 'drawerEmpresaNombre'];
    els.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = nombre;
    });
  }

  // ── Marcar link activo ───────────────────────────────────────
  function markActive() {
    const path = window.location.pathname;
    document.querySelectorAll('[data-nav], [data-drawer]').forEach(a => {
      if (a.tagName !== 'A') return;
      if (a.getAttribute('href') === path) a.classList.add('active');
      else a.classList.remove('active');
    });
  }

  // ── Auto-fit: oculta links que no caben y los mueve al dropdown ──
  const BREAKPOINT_MOBILE = 640; // px — por debajo usa drawer

  function fitNavLinks() {
    const navbar   = document.getElementById('spNavbar');
    const links    = document.getElementById('navLinks');
    const moreBtn  = document.getElementById('navMore');
    const dropdown = document.getElementById('navDropdown');
    const mobileBtn= document.getElementById('mobileMenuBtn');

    const W = navbar.offsetWidth;

    // En mobile: oculta nav links, muestra hamburguesa
    if (W < BREAKPOINT_MOBILE) {
      links.style.display    = 'none';
      moreBtn.style.display  = 'none';
      mobileBtn.style.display= 'flex';
      return;
    }

    // Desktop: muestra nav links
    mobileBtn.style.display = 'none';
    links.style.display = 'flex';

    // Resetea visibilidad de todos
    const allNavItems = links.querySelectorAll('[data-nav], [data-nav-divider]');
    allNavItems.forEach(el => { el.style.display = ''; });
    moreBtn.style.display = 'none';
    dropdown.innerHTML = '';

    // Espacio disponible = navbar width - logo - actions - padding
    const logoEl    = navbar.querySelector('.sp-logo');
    const actionsEl = navbar.querySelector('.sp-nav-actions');
    const MORE_BTN_W = 80;
    const PADDING    = 32;
    const available  = W - (logoEl?.offsetWidth || 160) - (actionsEl?.offsetWidth || 100) - PADDING - MORE_BTN_W;

    // Medimos cuántos caben
    let usedWidth = 0;
    const overflowLinks = [];

    allNavItems.forEach(el => {
      const w = el.offsetWidth || 0;
      if (usedWidth + w <= available) {
        usedWidth += w;
      } else {
        el.style.display = 'none';
        if (el.tagName === 'A') overflowLinks.push(el);
      }
    });

    if (overflowLinks.length > 0) {
      moreBtn.style.display = 'flex';
      overflowLinks.forEach(a => {
        const clone = document.createElement('a');
        clone.href = a.getAttribute('href');
        clone.innerHTML = a.innerHTML;
        if (a.classList.contains('active')) clone.classList.add('active');
        dropdown.appendChild(clone);
      });
    }
  }

  // ── Mobile Drawer ────────────────────────────────────────────
  window.openMobileDrawer = function () {
    const drawer = document.getElementById('mobileDrawer');
    drawer.classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeMobileDrawer = function () {
    const drawer = document.getElementById('mobileDrawer');
    drawer.classList.remove('open');
    document.body.style.overflow = '';
  };

  // Cerrar con Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeMobileDrawer();
  });

  // ── Dropdown "Más" toggle ────────────────────────────────────
  document.getElementById('navMoreBtn')?.addEventListener('click', e => {
    e.stopPropagation();
    const dd  = document.getElementById('navDropdown');
    const ico = document.getElementById('navMoreBtn').querySelector('i');
    dd.classList.toggle('open');
    if (ico) ico.style.transform = dd.classList.contains('open') ? 'rotate(180deg)' : '';
  });

  document.addEventListener('click', e => {
    const dd = document.getElementById('navDropdown');
    if (dd && !document.getElementById('navMore')?.contains(e.target)) {
      dd.classList.remove('open');
      const ico = document.getElementById('navMoreBtn')?.querySelector('i');
      if (ico) ico.style.transform = '';
    }
  });

  // ── ResizeObserver — reajusta en tiempo real ─────────────────
  if (window.ResizeObserver) {
    const ro = new ResizeObserver(() => fitNavLinks());
    ro.observe(document.getElementById('spNavbar'));
  } else {
    window.addEventListener('resize', fitNavLinks);
  }

  // ── Init ─────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    syncThemeIcons();
    loadEmpresaNombre();
    markActive();
    // Pequeño delay para que el DOM esté pintado y las medidas sean exactas
    requestAnimationFrame(() => requestAnimationFrame(fitNavLinks));
  });

  // En caso de que DOMContentLoaded ya haya pasado
  if (document.readyState !== 'loading') {
    syncThemeIcons();
    loadEmpresaNombre();
    markActive();
    requestAnimationFrame(() => requestAnimationFrame(fitNavLinks));
  }
})();
</script>
