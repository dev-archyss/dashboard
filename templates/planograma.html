<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planograma — CAPTA</title>
</head>
<body>
{% include 'navbar.html' %}

<main class="sp-page" style="max-width:860px">
  <div class="sp-page-hdr">
    <div>
      <h1 class="sp-page-title">Planograma</h1>
      <p class="sp-page-sub">{{ empresa_nombre }}</p>
    </div>
  </div>

  <!-- Upload -->
  <div class="sp-card" style="margin-bottom:20px">
    <p class="sp-sec-title">Subir / Actualizar Planograma</p>
    <form id="uploadForm" enctype="multipart/form-data">
      <div style="margin-bottom:12px">
        <label class="sp-label">Imagen (JPG/PNG)</label>
        <input type="file" id="planogramaFile" accept="image/jpeg,image/png" class="sp-input" style="padding:6px">
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <button type="submit" id="uploadBtn" class="sp-btn sp-btn-primary"><i class="fas fa-upload"></i> Subir Planograma</button>
        <span id="uploadMessage" style="font-size:.83rem"></span>
      </div>
    </form>
  </div>

  <!-- Visualización -->
  <div class="sp-card">
    <p class="sp-sec-title">Planograma actual</p>
    <div id="planogramaContainer" style="text-align:center;padding:24px">
      <div class="sp-skel" style="height:300px;border-radius:var(--r2)"></div>
    </div>
  </div>
</main>

<script>
async function loadPlanograma(){
  try{
    const r=await fetch('/api/planograma');
    const d=await r.json();
    const c=document.getElementById('planogramaContainer');
    if(d.url){
      c.innerHTML=`<img src="${d.url}" alt="Planograma" style="max-width:100%;border-radius:var(--r2);box-shadow:var(--sh2);cursor:zoom-in" onclick="captaLightbox('${d.url}')">
        <p style="font-size:.72rem;color:var(--muted);margin-top:8px"><i class="fas fa-clock"></i> Actualizado: ${d.updated_at?new Date(d.updated_at).toLocaleString('es-MX'):'—'}</p>`;
    }else{
      c.innerHTML=`<div style="padding:60px 0;color:var(--muted)"><i class="fas fa-image" style="font-size:3rem;display:block;margin-bottom:12px;opacity:.3"></i><p>Sin planograma cargado</p></div>`;
    }
  }catch(e){document.getElementById('planogramaContainer').innerHTML='<p style="color:var(--red);text-align:center">Error al cargar</p>';}
}

document.getElementById('uploadForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const fileInput=document.getElementById('planogramaFile');
  if(!fileInput.files.length){captaToast('Selecciona una imagen primero','warn');return;}
  const btn=document.getElementById('uploadBtn');
  const msg=document.getElementById('uploadMessage');
  btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Subiendo...';msg.textContent='';
  try{
    const formData=new FormData();formData.append('file',fileInput.files[0]);
    const r=await fetch('/api/planograma/upload',{method:'POST',body:formData});
    const d=await r.json();
    if(d.success){msg.innerHTML='<span style="color:var(--green)"><i class="fas fa-check"></i> Subido correctamente</span>';loadPlanograma();fileInput.value='';}
    else{msg.innerHTML=`<span style="color:var(--red)">${d.error}</span>`;}
  }catch(err){msg.innerHTML='<span style="color:var(--red)">Error al subir</span>';}
  finally{btn.disabled=false;btn.innerHTML='<i class="fas fa-upload"></i> Subir Planograma';}
});

window.addEventListener('capta:db-ready',()=>loadPlanograma());
</script>
</body>
</html>
