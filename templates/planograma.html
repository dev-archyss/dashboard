<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Planograma - {{ empresa_nombre }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 font-sans transition-colors duration-300">
    <script>tailwind.config = { darkMode: 'class' }</script>
    {% include 'navbar.html' %}

    <div class="container mx-auto p-6 max-w-4xl">
        <h1 class="text-3xl font-bold text-indigo-700 dark:text-indigo-400 mb-6">
            Gestión de Planograma - {{ empresa_nombre }}
        </h1>

        <div class="bg-white dark:bg-slate-800 rounded-lg shadow p-6 mb-8 border border-gray-200 dark:border-slate-700">
            <h2 class="text-xl font-semibold mb-4 text-gray-800 dark:text-white">Subir / Actualizar Planograma</h2>
            
            <form id="uploadForm" enctype="multipart/form-data" class="space-y-4">
                <div>
                    <label class="block text-gray-700 dark:text-gray-300 font-medium mb-2">
                        Selecciona imagen (JPG/PNG)
                    </label>
                    <input type="file" 
                           id="planogramaFile" 
                           accept="image/jpeg,image/png" 
                           class="w-full p-2 border dark:border-slate-600 dark:bg-slate-700 rounded">
                </div>

                <button type="submit" 
                        id="uploadBtn"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded font-medium transition">
                    Subir Planograma
                </button>
            </form>

            <div id="uploadMessage" class="mt-4 text-sm"></div>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-lg shadow p-6 border border-gray-200 dark:border-slate-700">
            <h2 class="text-xl font-semibold mb-4 text-gray-800 dark:text-white">Planograma Actual</h2>
            
            <div id="planogramaContainer" class="text-center">
                <p class="text-gray-500">Cargando...</p>
            </div>
        </div>
    </div>

    <script>
        // Cargar planograma actual al iniciar
        async function loadPlanograma() {
            try {
                const response = await fetch('/api/planograma');
                const data = await response.json();

                const container = document.getElementById('planogramaContainer');

                if (!data.success) {
                    container.innerHTML = `<p class="text-red-600">${data.error}</p>`;
                    return;
                }

                if (!data.has_planograma) {
                    container.innerHTML = '<p class="text-gray-600">No hay planograma cargado aún.</p>';
                    return;
                }

                container.innerHTML = `
                    <img src="${data.url}" 
                         alt="Planograma actual" 
                         class="max-w-full max-h-[70vh] mx-auto object-contain rounded shadow">
                `;
            } catch (error) {
                document.getElementById('planogramaContainer').innerHTML = 
                    '<p class="text-red-600">Error al cargar el planograma</p>';
            }
        }

        // Subir nuevo planograma
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('planogramaFile');
            if (!fileInput.files.length) {
                alert('Selecciona una imagen primero');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const btn = document.getElementById('uploadBtn');
            const message = document.getElementById('uploadMessage');
            
            btn.disabled = true;
            btn.textContent = 'Subiendo...';
            message.textContent = '';

            try {
                const response = await fetch('/api/planograma/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    message.innerHTML = '<span class="text-green-600">Planograma subido correctamente</span>';
                    loadPlanograma(); // recargar imagen
                    fileInput.value = ''; // limpiar input
                } else {
                    message.innerHTML = `<span class="text-red-600">${data.error}</span>`;
                }
            } catch (error) {
                message.innerHTML = '<span class="text-red-600">Error al subir el archivo</span>';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Subir Planograma';
            }
        });

        // Cargar al iniciar
        window.onload = loadPlanograma;
    </script>
</body>
</html>
