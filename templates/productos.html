<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos — CAPTA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
{% include 'navbar.html' %}

<main class="sp-page">
  <div class="sp-page-hdr">
    <div>
      <h1 class="sp-page-title">Productos propios</h1>
      <p class="sp-page-sub">Gestiona las presentaciones de tus productos.</p>
    </div>
    <span id="count_label" class="sp-bdg sp-bdg-accent" style="font-size:.8rem;padding:4px 14px">— productos</span>
  </div>

  <!-- Formulario crear -->
  <div class="sp-card" style="margin-bottom:20px">
    <p class="sp-sec-title" id="formTitle">Nueva presentación</p>
    <form id="productForm">
      <input type="hidden" id="product_id">
      <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end">
        <div style="flex:2;min-width:200px">
          <label class="sp-label">Presentación *</label>
          <input type="text" id="presentation" class="sp-input" placeholder="Nombre de la presentación" required oninput="this.value=this.value.toUpperCase()">
        </div>
        <div style="flex:1;min-width:160px">
          <label class="sp-label">Línea</label>
          <select id="linea_id" class="sp-select"><option value="">Sin línea</option></select>
        </div>
        <div style="display:flex;gap:8px">
          <button type="submit" class="sp-btn sp-btn-primary"><i class="fas fa-plus"></i> Crear</button>
          <button type="button" id="cancelButton" class="sp-btn sp-btn-sec" style="display:none" onclick="resetForm()"><i class="fas fa-times"></i> Cancelar</button>
        </div>
      </div>
    </form>
  </div>

  <!-- Filtros por línea -->
  <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:16px">
    <span style="font-size:.75rem;color:var(--muted);font-weight:600">Filtrar:</span>
    <button id="filtro_todas" class="sp-btn sp-btn-sec sp-btn-sm" style="border-radius:99px" onclick="aplicarFiltro('')">Todas</button>
    <button id="filtro_sin_linea" class="sp-btn sp-btn-sec sp-btn-sm" style="border-radius:99px" onclick="aplicarFiltro('__sin_linea__')">Sin línea</button>
    <div id="filtros_lineas" style="display:flex;flex-wrap:wrap;gap:6px"></div>
  </div>

  <!-- Tabla -->
  <div class="sp-tbl-wrap">
    <div style="overflow-x:auto;max-height:65vh">
      <table class="sp-tbl">
        <thead><tr>
          <th>Presentación</th>
          <th>Línea</th>
          <th>Creado</th>
          <th style="text-align:center">Acciones</th>
        </tr></thead>
        <tbody id="productsTableBody">
          <tr><td colspan="4" style="text-align:center;padding:36px;color:var(--muted)"><i class="fas fa-spinner fa-spin" style="color:var(--accent);display:block;margin-bottom:8px;font-size:1.2rem"></i>Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modal editar -->
<div class="sp-overlay" id="editModal">
  <div class="sp-modal sp-modal-sm">
    <div class="sp-modal-hdr">
      <div class="sp-modal-title">Editar presentación</div>
      <button class="sp-modal-close" onclick="closeEdit()"><i class="fas fa-times"></i></button>
    </div>
    <div class="sp-modal-body">
      <div style="margin-bottom:12px">
        <label class="sp-label">Presentación *</label>
        <input type="text" id="modal_presentation" class="sp-input" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div>
        <label class="sp-label">Línea</label>
        <select id="modal_linea_id" class="sp-select"><option value="">Sin línea</option></select>
      </div>
    </div>
    <div class="sp-modal-footer">
      <button class="sp-btn sp-btn-sec" onclick="closeEdit()">Cancelar</button>
      <button class="sp-btn sp-btn-primary" onclick="guardarEdicion()"><i class="fas fa-save"></i> Guardar</button>
    </div>
  </div>
</div>

<script>
const supabaseUrl='https://djjylikkocemrlsjxscr.supabase.co';
const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqanlsaWtrb2NlbXJsc2p4c2NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMxNjUyNDEsImV4cCI6MjA3ODc0MTI0MX0.fnv1BKn_o-PYEAPljG0V3dt3b2Uifwn8EEzkP8Aab3M';
const db=supabase.createClient(supabaseUrl,supabaseKey);
const empresaId=localStorage.getItem('empresa_id');
if(!empresaId)window.location.href='/';

let allProducts=[],allLineas=[],filtroActivo='',editingId=null;

async function loadLineas(){
  const{data}=await db.from('web_lineas').select('id,nombre').eq('empresa_id',empresaId).eq('activa',true).order('nombre');
  allLineas=data||[];
  ['linea_id','modal_linea_id'].forEach(id=>{
    const s=document.getElementById(id);s.innerHTML='<option value="">Sin línea</option>';
    allLineas.forEach(l=>s.innerHTML+=`<option value="${l.id}">${l.nombre}</option>`);
  });
  // Botones de filtro
  const c=document.getElementById('filtros_lineas');c.innerHTML='';
  allLineas.forEach(l=>{
    const b=document.createElement('button');b.id=`filtro_${l.id}`;
    b.className='sp-btn sp-btn-sec sp-btn-sm';b.style.borderRadius='99px';b.textContent=l.nombre;
    b.onclick=()=>aplicarFiltro(l.id);c.appendChild(b);
  });
}

async function loadProducts(){
  const tbody=document.getElementById('productsTableBody');
  tbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:36px;color:var(--muted)"><i class="fas fa-spinner fa-spin" style="color:var(--accent);display:block;margin-bottom:8px;font-size:1.2rem"></i>Cargando...</td></tr>';
  const{data,error}=await db.from('web_myproductos').select('id,presentation,linea_id,created_at,web_lineas(id,nombre)').eq('empresa_id',empresaId).order('presentation');
  if(error){tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--red);padding:24px">Error al cargar</td></tr>';return;}
  allProducts=data||[];renderTable();
}

function renderTable(){
  const tbody=document.getElementById('productsTableBody');
  let items=allProducts;
  if(filtroActivo==='__sin_linea__')items=allProducts.filter(p=>!p.linea_id);
  else if(filtroActivo)items=allProducts.filter(p=>p.linea_id===filtroActivo);
  document.getElementById('count_label').textContent=`${items.length} / ${allProducts.length} productos`;
  document.querySelectorAll('.filtro-activo').forEach(b=>b.classList.remove('filtro-activo','sp-btn-primary'));
  const actBtn=filtroActivo===''?'filtro_todas':filtroActivo==='__sin_linea__'?'filtro_sin_linea':`filtro_${filtroActivo}`;
  const ab=document.getElementById(actBtn);if(ab){ab.classList.add('sp-btn-primary');ab.classList.remove('sp-btn-sec');}
  if(!items.length){tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:36px">Sin productos para este filtro</td></tr>';return;}
  const fmt=s=>{if(!s)return'—';const d=new Date(s);return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'2-digit'});};
  tbody.innerHTML=items.map(p=>{
    const lBdg=p.web_lineas?.nombre?`<span class="sp-bdg sp-bdg-teal">${p.web_lineas.nombre}</span>`:'<span class="sp-bdg sp-bdg-def">Sin línea</span>';
    return`<tr>
      <td class="sp-hi">${p.presentation}</td>
      <td>${lBdg}</td>
      <td>${fmt(p.created_at)}</td>
      <td style="text-align:center;white-space:nowrap">
        <button onclick="openEdit('${p.id}')" class="sp-btn sp-btn-sec sp-btn-sm"><i class="fas fa-pen"></i></button>
        <button onclick="deleteProduct('${p.id}')" class="sp-btn sp-btn-danger sp-btn-sm" style="margin-left:4px"><i class="fas fa-trash"></i></button>
      </td>
    </tr>`;
  }).join('');
}

window.aplicarFiltro=function(v){filtroActivo=v;renderTable();};

document.getElementById('productForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const id=document.getElementById('product_id').value;
  const presentation=document.getElementById('presentation').value.trim().toUpperCase();
  const lineaId=document.getElementById('linea_id').value||null;
  if(!presentation)return;
  if(id){
    const{error}=await db.from('web_myproductos').update({presentation,linea_id:lineaId}).eq('id',id).eq('empresa_id',empresaId);
    if(error){captaToast(error.message.includes('unique')?'Presentación ya existe':error.message,'error');return;}
    captaToast('Actualizado','success');resetForm();loadProducts();
  }else{
    const{error}=await db.from('web_myproductos').insert([{presentation,linea_id:lineaId,empresa_id:empresaId}]);
    if(error){captaToast(error.message.includes('unique')?'Ya existe esa presentación':error.message,'error');return;}
    captaToast('Presentación creada','success');resetForm();loadProducts();
  }
});

function openEdit(id){
  const p=allProducts.find(x=>x.id===id);if(!p)return;
  editingId=id;
  document.getElementById('modal_presentation').value=p.presentation;
  document.getElementById('modal_linea_id').value=p.linea_id||'';
  document.getElementById('editModal').classList.add('open');
}

async function guardarEdicion(){
  if(!editingId)return;
  const presentation=document.getElementById('modal_presentation').value.trim().toUpperCase();
  const lineaId=document.getElementById('modal_linea_id').value||null;
  if(!presentation){captaToast('Nombre requerido','error');return;}
  const{error}=await db.from('web_myproductos').update({presentation,linea_id:lineaId}).eq('id',editingId).eq('empresa_id',empresaId);
  if(error){captaToast(error.message.includes('unique')?'Ya existe esa presentación':error.message,'error');return;}
  captaToast('Actualizado','success');closeEdit();editingId=null;loadProducts();
}

async function deleteProduct(id){
  if(!confirm('¿Eliminar esta presentación?'))return;
  const{error}=await db.from('web_myproductos').delete().eq('id',id).eq('empresa_id',empresaId);
  if(error){captaToast('Error al eliminar','error');return;}
  captaToast('Eliminado','success');loadProducts();
}

function resetForm(){
  document.getElementById('product_id').value='';document.getElementById('presentation').value='';
  document.getElementById('linea_id').value='';document.getElementById('formTitle').textContent='Nueva presentación';
  document.getElementById('cancelButton').style.display='none';
}

function closeEdit(){document.getElementById('editModal').classList.remove('open');}
document.getElementById('editModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEdit();});

document.addEventListener('DOMContentLoaded',async()=>{await loadLineas();await loadProducts();});
</script>
</body>
</html>
