<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Productos Nuestros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'fondo-claro': '#F9FAFB', 
                        'panel-claro': '#FFFFFF', 
                        'texto-oscuro': '#1F2937', 
                        'turquesa-base': '#14B8A6',  
                        'turquesa-claro': '#5EEAD4',  
                        'turquesa-oscuro': '#0F766E',  
                    }
                }
            }
        }
    </script>
    <style>
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #FFFFFF; margin: 5% auto; padding: 30px; border-radius: 12px; width: 80%; max-width: 600px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .close { color: #0F766E; float: right; font-size: 32px; font-weight: bold; cursor: pointer; line-height: 0.8; }

        .btn-turquesa { 
            background-image: linear-gradient(to right, #14B8A6, #0F766E) !important; 
            color: white !important; 
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-turquesa:hover { opacity: 0.9; box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15); }

        .header-bg { background-image: linear-gradient(to right, #5EEAD4, #14B8A6); }

        #productsTable th, #productsTable td { 
            padding: 0.6rem 1.5rem; 
            font-size: 0.875rem; 
        }
        
        .table-container { 
            max-height: 500px; 
            overflow-y: auto; 
            border: 1px solid #E5E7EB; 
            border-radius: 0.75rem;
        }

        #productsTable thead th {
            position: sticky;
            top: 0;
            background-color: #F9FAFB; 
            z-index: 10;
        }
    </style>
</head>
<body class="bg-fondo-claro p-8 font-sans text-texto-oscuro">
    <div class="max-w-5xl mx-auto"> 
        <div class="header-bg p-6 rounded-xl shadow-xl mb-8">
            <h1 class="text-3xl font-extrabold text-white text-center tracking-wide">
                GESTIÓN DE PRESENTACIONES DE PRODUCTOS
            </h1>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mb-8">
            <a href="/" class="bg-gray-200 text-texto-oscuro p-2.5 rounded-lg hover:bg-gray-300 transition duration-150 text-sm font-semibold">DASHBOARD</a>
            <a href="/clientes" class="bg-gray-200 text-texto-oscuro p-2.5 rounded-lg hover:bg-gray-300 transition duration-150 text-sm font-semibold">PANEL CLIENTES</a>
            <a href="/productos" class="btn-turquesa p-2.5 rounded-lg transition duration-150 text-sm font-semibold">PRESENTACIONES PROPIAS</a>
            <a href="/competencia" class="bg-gray-200 text-texto-oscuro p-2.5 rounded-lg hover:bg-gray-300 transition duration-150 text-sm font-semibold">PRODUCTOS COMPETENCIA</a>
            <a href="/analisis" class="bg-gray-200 text-texto-oscuro p-2.5 rounded-lg hover:bg-gray-300 transition duration-150 text-sm font-semibold">ANÁLISIS DE DATOS</a>
            <a href="/promotores" class="bg-gray-200 text-texto-oscuro p-2.5 rounded-lg hover:bg-gray-300 transition duration-150 text-sm font-semibold">GESTOR PROMOTORES</a>
        </div>

        <div class="mb-10 bg-panel-claro p-6 rounded-xl shadow-lg border border-gray-200">
            <h2 class="text-xl font-semibold mb-4 text-turquesa-oscuro" id="formTitle">AÑADIR NUEVA PRESENTACIÓN</h2>
            <form id="productForm" class="flex flex-col md:flex-row gap-3 items-center">
                <input type="hidden" id="product_id" value="">
                
                <input 
                    type="text" 
                    id="presentation" 
                    placeholder="NOMBRE/DESCRIPCIÓN DE LA PRESENTACIÓN (*)" 
                    class="p-2.5 border border-gray-300 rounded-lg focus:ring-turquesa-base focus:border-turquesa-base transition uppercase w-full md:w-3/5" 
                    required
                >
                
                <div class="flex space-x-3 w-full md:w-2/5 justify-end"> 
                    <button type="submit" id="submitButton" class="btn-turquesa px-4 py-2.5 rounded-lg font-bold text-sm w-full md:w-auto"> 
                        CREAR PRESENTACIÓN
                    </button>
                    <button type="button" id="cancelButton" class="bg-gray-400 text-white px-4 py-2.5 rounded-lg font-bold text-sm hover:bg-gray-500 transition duration-150 hidden w-full md:w-auto" onclick="resetForm()">
                        CANCELAR
                    </button>
                </div>
            </form>
        </div>

        <h2 class="text-xl font-semibold mb-4 text-turquesa-oscuro">LISTA DE PRESENTACIONES</h2>
        <div class="bg-panel-claro p-4 rounded-xl shadow-lg table-container">
            <table id="productsTable" class="min-w-full divide-y divide-gray-200">
                <thead>
                    <tr class="bg-gray-50">
                        <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-3/5">PRESENTACIÓN</th>
                        <th class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/5">CREADO EN</th>
                        <th class="text-center text-xs font-medium text-gray-500 uppercase tracking-wider w-1/5">ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody" class="bg-white divide-y divide-gray-100">
                </tbody>
            </table>
            <p id="loadingMessage" class="text-center text-gray-500 py-4">Cargando presentaciones...</p>
        </div>
    </div>

    <script>
        // API
        const API_URL = '/api/myproducts';

        // Elementos
        const form = document.getElementById('productForm');
        const tableBody = document.getElementById('productsTableBody');
        const submitButton = document.getElementById('submitButton');
        const cancelButton = document.getElementById('cancelButton');
        const formTitle = document.getElementById('formTitle');
        const loadingMessage = document.getElementById('loadingMessage');
        const inputPresentation = document.getElementById('presentation');
        const defaultHeaders = { 'Content-Type': 'application/json' };

        // Formatear fecha
        function formatDateTime(isoString) {
            if (!isoString) return 'N/A';
            const date = new Date(isoString);
            const d = date.toLocaleDateString('es-ES', { year: '2-digit', month: '2-digit', day: '2-digit' });
            const t = date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', hour12: false });
            return `${d} ${t}`;
        }

        // Cargar productos
        async function loadProducts() {
            loadingMessage.classList.remove('hidden');
            tableBody.innerHTML = '';
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderTable(data.products);
            } catch (error) {
                console.error('Error al cargar productos:', error);
                loadingMessage.textContent = 'ERROR AL CARGAR LOS DATOS.';
                loadingMessage.classList.remove('hidden');
            }
        }

        // Renderizar tabla
        function renderTable(products) {
            tableBody.innerHTML = '';
            loadingMessage.classList.add('hidden');
            if (!products || products.length === 0) {
                loadingMessage.textContent = 'NO HAY PRESENTACIONES REGISTRADAS.';
                loadingMessage.classList.remove('hidden');
                return;
            }
            
            products.forEach(product => {
                const row = tableBody.insertRow();
                row.id = `row-${product.id}`;
                row.className = 'hover:bg-gray-50 transition duration-150';

                row.insertCell().textContent = product.presentation;
                row.insertCell().textContent = formatDateTime(product.created_at);
                
                const actionsCell = row.insertCell();
                actionsCell.className = 'whitespace-nowrap text-center text-xs font-medium space-x-2';
                actionsCell.innerHTML = `
                    <button onclick="editProduct('${product.id}', \`${product.presentation.replace(/'/g, "\\'")}\`)" class="text-turquesa-base hover:text-turquesa-oscuro transition duration-150">EDITAR</button>
                    <button onclick="deleteProduct('${product.id}')" class="text-red-600 hover:text-red-800 transition duration-150">ELIMINAR</button>
                `;
            });
        }

        // === ENVÍO DE FORMULARIO (CORREGIDO) ===
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('product_id').value;
            const presentation = inputPresentation.value.trim().toUpperCase();
            
            if (!presentation) {
                alert("EL NOMBRE DE LA PRESENTACIÓN ES OBLIGATORIO.");
                return;
            }
            
            const payload = { presentation };

            try {
                let response;
                if (id) {
                    response = await fetch(`${API_URL}/${id}`, {
                        method: 'PATCH',
                        headers: defaultHeaders,
                        body: JSON.stringify(payload)
                    });
                } else {
                    response = await fetch(API_URL, {
                        method: 'POST',
                        headers: defaultHeaders,
                        body: JSON.stringify(payload)
                    });
                }

                // ÉXITO: 200, 201, 204
                if (response.ok || response.status === 201 || response.status === 204) {
                    alert(id ? 'PRESENTACIÓN ACTUALIZADA CON ÉXITO.' : 'PRESENTACIÓN CREADA CON ÉXITO.');
                    resetForm();
                    loadProducts();
                    return;
                }

                // ERROR: intentar leer JSON solo si hay contenido
                let errorMessage = 'ERROR DESCONOCIDO';
                try {
                    const errorData = await response.json();
                    errorMessage = errorData.error || response.statusText;

                    if (errorMessage.includes('web_myproductos_presentation_key') || errorMessage.includes('unique constraint')) {
                        errorMessage = "ERROR: EL NOMBRE DE LA PRESENTACIÓN YA EXISTE. DEBE SER ÚNICO.";
                    }
                } catch (jsonError) {
                    errorMessage = response.statusText || `ERROR HTTP ${response.status}`;
                }

                alert(`ERROR: ${errorMessage}`);

            } catch (error) {
                console.error('Error en la operación:', error);
                alert('ERROR DE CONEXIÓN CON LA API.');
            }
        });

        // Editar
        function editProduct(id, presentation) {
            document.getElementById('product_id').value = id;
            inputPresentation.value = presentation;
            formTitle.textContent = 'EDITAR PRESENTACIÓN';
            submitButton.textContent = 'GUARDAR CAMBIOS';
            cancelButton.classList.remove('hidden');
            
            document.querySelectorAll('#productsTableBody tr').forEach(row => {
                row.classList.remove('bg-turquesa-claro', 'bg-opacity-20');
            });
            document.getElementById(`row-${id}`).classList.add('bg-turquesa-claro', 'bg-opacity-20');
            inputPresentation.focus();
        }

        // Resetear formulario
        function resetForm() {
            const currentId = document.getElementById('product_id').value;
            if (currentId) {
                const row = document.getElementById(`row-${currentId}`);
                if (row) row.classList.remove('bg-turquesa-claro', 'bg-opacity-20');
            }
            document.getElementById('product_id').value = '';
            form.reset();
            formTitle.textContent = 'AÑADIR NUEVA PRESENTACIÓN';
            submitButton.textContent = 'CREAR PRESENTACIÓN';
            cancelButton.classList.add('hidden');
        }

        // Eliminar
        async function deleteProduct(id) {
            if (!confirm(`¿ESTÁS SEGURO DE QUE QUIERES ELIMINAR ESTA PRESENTACIÓN?`)) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: defaultHeaders
                });

                if (response.status === 204 || response.ok) {
                    alert('PRESENTACIÓN ELIMINADA CON ÉXITO.');
                    loadProducts();
                } else {
                    const err = await response.json().catch(() => ({}));
                    alert(`ERROR: ${err.error || 'No se pudo eliminar'}`);
                }
            } catch (error) {
                alert('ERROR DE CONEXIÓN AL ELIMINAR.');
            }
        }

        // Exportar funciones
        window.editProduct = editProduct;
        window.deleteProduct = deleteProduct;
        window.resetForm = resetForm;

        // Cargar al iniciar
        window.onload = loadProducts;
    </script>
</body>
</html>
