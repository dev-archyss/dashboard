<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Stock — CAPTA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
{% include 'navbar.html' %}

<main class="sp-page">
  <div class="sp-page-hdr">
    <div>
      <h1 class="sp-page-title">Control de Stock</h1>
      <p class="sp-page-sub">Monitoreo de inventario en anaquel y bodega por visita.</p>
    </div>
    <div style="display:flex;align-items:center;gap:7px">
      <div class="sp-live"></div>
      <span style="font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em">En vivo</span>
    </div>
  </div>

  <!-- KPIs -->
  <div class="sp-grid sp-g4 sp-gap4" style="margin-bottom:20px">
    <div class="sp-card sp-kpi amber">
      <div class="sp-kpi-top">
        <div class="sp-kpi-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <div style="text-align:right"><div class="sp-kpi-val" id="lowStockVisits">—</div><div class="sp-kpi-lbl">Stock bajo (≤5)</div></div>
      </div>
      <div class="sp-kpi-bar"><div class="sp-kpi-fill" id="b1" style="width:0%;background:var(--amber)"></div></div>
    </div>
    <div class="sp-card sp-kpi rose">
      <div class="sp-kpi-top">
        <div class="sp-kpi-icon"><i class="fas fa-times-circle"></i></div>
        <div style="text-align:right"><div class="sp-kpi-val" id="criticalLow">—</div><div class="sp-kpi-lbl">Stock crítico (≤2)</div></div>
      </div>
      <div class="sp-kpi-bar"><div class="sp-kpi-fill" id="b2" style="width:0%;background:var(--red)"></div></div>
    </div>
    <div class="sp-card sp-kpi purple">
      <div class="sp-kpi-top">
        <div class="sp-kpi-icon"><i class="fas fa-chart-bar"></i></div>
        <div style="text-align:right"><div class="sp-kpi-val" id="avgShelfStock">—</div><div class="sp-kpi-lbl">Promedio anaquel</div></div>
      </div>
      <div class="sp-kpi-bar"><div class="sp-kpi-fill" id="b3" style="width:0%;background:var(--purple)"></div></div>
    </div>
    <div class="sp-card sp-kpi indigo">
      <div class="sp-kpi-top">
        <div class="sp-kpi-icon"><i class="fas fa-boxes"></i></div>
        <div style="text-align:right"><div class="sp-kpi-val" id="totalProductsTracked">—</div><div class="sp-kpi-lbl">Productos rastreados</div></div>
      </div>
      <div class="sp-kpi-bar"><div class="sp-kpi-fill" id="b4" style="width:0%;background:var(--accent)"></div></div>
    </div>
  </div>

  <!-- Filtros -->
  <div class="sp-card" style="margin-bottom:20px">
    <p class="sp-sec-title">Filtros</p>
    <div class="sp-grid sp-g3 sp-gap4" style="margin-bottom:12px">
      <div>
        <label class="sp-label">Producto</label>
        <select id="product" class="sp-select"><option value="all">Todos</option></select>
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding-top:20px">
        <input type="checkbox" id="onlyLowStock" checked>
        <label for="onlyLowStock" style="font-size:.83rem;cursor:pointer;font-weight:500">Solo stock bajo (≤5)</label>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="renderStockTable()" class="sp-btn sp-btn-primary"><i class="fas fa-filter"></i> Aplicar</button>
      <button onclick="clearFilters()" class="sp-btn sp-btn-sec"><i class="fas fa-undo"></i> Limpiar</button>
    </div>
  </div>

  <!-- Tabla -->
  <div class="sp-tbl-wrap">
    <div style="overflow-x:auto;max-height:65vh">
      <table class="sp-tbl">
        <thead><tr>
          <th>Fecha</th><th>Promotor</th><th>Comercio</th><th>Producto</th>
          <th style="text-align:center">Anaquel</th><th style="text-align:center">Bodega</th><th style="text-align:center">Ver</th>
        </tr></thead>
        <tbody id="stockTableBody">
          <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted)"><i class="fas fa-spinner fa-spin" style="font-size:1.3rem;color:var(--accent);display:block;margin-bottom:8px"></i>Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modal detalle visita -->
<div class="sp-overlay" id="stockModal">
  <div class="sp-modal sp-modal-lg">
    <div class="sp-modal-hdr">
      <div class="sp-modal-title">Detalle de Stock</div>
      <button class="sp-modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="sp-modal-body" id="stockModalContent"></div>
  </div>
</div>

<script>
const supabaseUrl='https://djjylikkocemrlsjxscr.supabase.co';
const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqanlsaWtrb2NlbXJsc2p4c2NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMxNjUyNDEsImV4cCI6MjA3ODc0MTI0MX0.fnv1BKn_o-PYEAPljG0V3dt3b2Uifwn8EEzkP8Aab3M';
const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);
const empresaId=localStorage.getItem('empresa_id');
if(!empresaId)window.location.href='/';

let allStockData=[];

function stockColor(s){const n=parseInt(s);if(isNaN(n))return'var(--muted)';if(n<=2)return'var(--red)';if(n<=5)return'var(--amber)';return'var(--green)';}
function stockBdg(s){const n=parseInt(s);if(isNaN(n))return'sp-bdg-def';if(n<=2)return'sp-bdg-err';if(n<=5)return'sp-bdg-warn';return'sp-bdg-ok';}

async function loadStockData(){
  const{data,error}=await supabaseClient.from('web_precios').select('id,created_at,promoter_id,trade,state,zone,myitems,web_promotores!inner(promoter_name)').eq('empresa_id',empresaId).not('myitems','is',null).order('created_at',{ascending:false}).limit(300);
  if(error){console.error(error);return;}
  allStockData=(data||[]).map(v=>({...v,myitems:v.myitems||[]}));
  poblarProductSelect();renderStockTable();updateStockStats();
}

function poblarProductSelect(){
  const prods=new Set();allStockData.forEach(v=>v.myitems.forEach(i=>{if(i.presentation)prods.add(i.presentation);}));
  const sel=document.getElementById('product');sel.innerHTML='<option value="all">Todos</option>';
  [...prods].sort().forEach(p=>sel.innerHTML+=`<option value="${p}">${p}</option>`);
}

function renderStockTable(){
  const tbody=document.getElementById('stockTableBody');
  const onlyLow=document.getElementById('onlyLowStock').checked;
  const selProd=document.getElementById('product').value;
  let filtered=allStockData;
  if(onlyLow)filtered=filtered.filter(v=>v.myitems.some(i=>parseInt(i.stock_shelf||999)<=5));
  if(selProd!=='all')filtered=filtered.filter(v=>v.myitems.some(i=>i.presentation===selProd));
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted)">Sin datos con los filtros actuales</td></tr>';return;}
  const rows=[];
  filtered.forEach(v=>{
    v.myitems.forEach(item=>{
      const sa=parseInt(item.stock_shelf??999);const isLow=sa<=5;
      const dt=new Date(v.created_at).toLocaleDateString('es-MX',{day:'2-digit',month:'short'});
      rows.push(`<tr style="${isLow?'background:rgba(245,158,11,.06)':''}">
        <td class="sp-hi">${dt}</td>
        <td style="color:var(--accent);font-weight:500">${v.web_promotores?.promoter_name||'—'}</td>
        <td>${v.trade||'—'}</td>
        <td class="sp-hi">${item.presentation||'—'}</td>
        <td style="text-align:center"><span class="sp-bdg ${stockBdg(sa)}">${sa===999?'—':sa}</span></td>
        <td style="text-align:center;color:var(--txt2)">${item.stock_warehouse??'—'}</td>
        <td style="text-align:center"><button onclick="showVisitDetail('${v.id}')" class="sp-btn sp-btn-sec sp-btn-sm"><i class="fas fa-eye"></i></button></td>
      </tr>`);
    });
  });
  tbody.innerHTML=rows.join('');
}

function updateStockStats(){
  let low=0,crit=0,total=0,sumShelf=0;
  allStockData.forEach(v=>v.myitems.forEach(i=>{
    const s=parseInt(i.stock_shelf??999);
    if(s!==999){total++;sumShelf+=s;}
    if(s<=5)low++;if(s<=2)crit++;
  }));
  document.getElementById('lowStockVisits').textContent=low;
  document.getElementById('criticalLow').textContent=crit;
  document.getElementById('avgShelfStock').textContent=total?(sumShelf/total).toFixed(1):'0';
  document.getElementById('totalProductsTracked').textContent=total;
}

async function showVisitDetail(visitId){
  const{data}=await supabaseClient.from('web_precios').select('*,web_promotores(promoter_name)').eq('id',visitId).single();
  if(!data)return;
  const content=document.getElementById('stockModalContent');
  const hdr=`<div class="sp-grid sp-g3 sp-gap3" style="margin-bottom:20px">
    ${[['Fecha',new Date(data.created_at).toLocaleString('es-MX')],['Promotor',data.web_promotores?.promoter_name||'—'],['Comercio',data.trade||'—']].map(([l,v])=>`<div class="sp-card sp-card-sm"><p style="font-size:.65rem;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em">${l}</p><p style="font-weight:500">${v}</p></div>`).join('')}
  </div><p class="sp-sec-title">Detalle de Stock</p>
  <div class="sp-grid sp-g3 sp-gap3">`;
  const items=(data.myitems||[]).map(item=>{
    const sa=item.stock_shelf??'—',sb=item.stock_warehouse??'—';
    const sc=stockColor(sa);
    return`<div class="sp-card sp-card-sm">
      <p style="font-weight:600;font-size:.83rem;margin-bottom:10px">${item.presentation||'—'}</p>
      <div style="display:flex;gap:10px">
        <div style="flex:1;text-align:center;background:var(--inp);border-radius:var(--r1);padding:10px">
          <p style="font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Anaquel</p>
          <p style="font-size:1.5rem;font-weight:800;color:${sc};font-family:'Syne',sans-serif">${sa}</p>
        </div>
        <div style="flex:1;text-align:center;background:var(--inp);border-radius:var(--r1);padding:10px">
          <p style="font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Bodega</p>
          <p style="font-size:1.5rem;font-weight:800;color:var(--blue);font-family:'Syne',sans-serif">${sb}</p>
        </div>
      </div>
    </div>`;
  }).join('');
  content.innerHTML=hdr+items+'</div>';
  document.getElementById('stockModal').classList.add('open');
}

function clearFilters(){document.getElementById('onlyLowStock').checked=true;document.getElementById('product').value='all';renderStockTable();}
function closeModal(){document.getElementById('stockModal').classList.remove('open');}
document.getElementById('stockModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener('DOMContentLoaded',()=>loadStockData());
</script>
</body>
</html>
